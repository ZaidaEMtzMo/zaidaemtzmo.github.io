<!DOCTYPE html>
<html lang="{{ site.lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | {{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        // Retrieve stored language or default to English
        let storedLang = localStorage.getItem("language") || "en";

        // Fix issue where language might be undefined
        if (!["en", "es", "fr"].includes(storedLang)) {
            storedLang = "en";
            localStorage.setItem("language", storedLang);
        }

        // Set the correct lang attribute in the HTML document
        document.documentElement.lang = storedLang;

        // If the user is at the root `/`, redirect them to their stored language
        if (window.location.pathname === "/") {
            window.location.href = `/${storedLang}/`;
        }

        // Define translations (must match `_data/translations.yml`)
        const translations = {
            en: { home: "Home", research: "Research" },
            es: { home: "Inicio", research: "Investigación" },
            fr: { home: "Accueil", research: "Recherche" }
        };

        // Update navigation links dynamically and ensure they always point to the correct language
        document.getElementById("home-link").setAttribute("href", `/${storedLang}/`);
        document.getElementById("home-link").textContent = translations[storedLang].home;
        document.getElementById("research-link").setAttribute("href", `/${storedLang}/research/`);
        document.getElementById("research-link").textContent = translations[storedLang].research;

        // Function to change language
        function changeLanguage(selectedLang) {
            localStorage.setItem("language", selectedLang); // Save selected language

            // let currentPath = window.location.pathname.split('/');
            let currentPath = window.location.pathname.split('/').filter(p => p.length > 0);
            let currentLang = currentPath[0]; // Detect current language folder (en, es, fr)

            // If on the home page or a section like "research", switch the language normally
            if (currentPath.length === 1) {
                window.location.href = `/${selectedLang}/`;
                return;
            }
            
            // If the page is a section (e.g., "/en/research/"), keep the path and switch the language
            if (currentPath.length >= 2 && currentPath[1] !== "all-posts") {
                let section = currentPath.slice(1).join('/');
                window.location.href = `/${selectedLang}/${section}/`;
                return;
            }

            if (currentPath[1] === "all-posts" && isNaN(currentPath[2])) {
                let section = currentPath.slice(1).join('/');
                window.location.href = `/${selectedLang}/${section}/`;
                return;
            }

            // Check if the current path is a post based on "/posts/"
            if (currentPath[1] === "all-posts" && !isNaN(currentPath[2])) {
                let year = currentPath[2];  // Get the year (e.g., "2025")
                let month = currentPath[3]; // Get the month (e.g., "02")
                let day = currentPath[4];   // Get the day (e.g., "27")
                let postSlug = currentPath[5]; // Get the post filename (e.g., "always-a-biologist.html")

                // Redirect to the correct language version of the post
                window.location.href = `/${selectedLang}/all-posts/${year}/${month}/${day}/${postSlug}`;
                return;
            }

            // Default fallback: just switch the language folder
            window.location.href = `/${selectedLang}/`;
        }

        // Add event listener to language dropdown
        document.querySelectorAll(".dropdown-content a").forEach(link => {
            link.addEventListener("click", function (event) {
                event.preventDefault();
                let selectedLang = this.getAttribute("href").split("/")[1]; // Extract language code
                changeLanguage(selectedLang);
            });
        });
    });
</script>
<body>
    <header>
        <h1>{{ site.title }}</h1>
        <nav>
            <ul>
                <li><a id="home-link" href="/en/"></a></li>
                <li><a id="research-link" href="/en/research/"></a></li>
            </ul>
        </nav>
        <div class="header-container">
            <div class="social-links">
                <a href="https://linkedin.com/in/zemm" target="_blank" title="LinkedIn"><i class="fab fa-linkedin"></i></a>
                <a href="https://github.com/ZaidaEMtzMo" target="_blank" title="GitHub"><i class="fab fa-github"></i></a>
                <a href="https://orcid.org/0000-0001-6388-8738" target="_blank" title="ORCID"><i class="fab fa-orcid"></i></a>
                <a href="https://facebook.com/ZEMartinezMoreno/" target="_blank" title="Facebook"><i class="fab fa-facebook"></i></a>
                <a href="https://instagram.com/zaida_escila/" target="_blank" title="Instagram"><i class="fab fa-instagram"></i></a>
            </div>
            <div class="language-dropdown">    
                <a href="#" class="dropbtn"><i class="fas fa-language"></i></a>
                <div class="dropdown-content">
                    <a href="/en/">English</a>
                    <a href="/es/">Español</a>
                    <a href="/fr/">Français</a>
                </div>
            </div>
        </div>
    </header>
    
    <main>
        {{ content }}
    </main>

    <footer>
        <p>&copy; {{ site.time | date: "%Y" }} {{ site.author }}</p>
    </footer>
</body>
</html>
